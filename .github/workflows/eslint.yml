name: ESLint

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'src/js/**'
      - 'package.json'
      - 'package-lock.json'
      - '.eslintrc*'
      - '.github/workflows/eslint.yml'

permissions: {}

concurrency:
  group: eslint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eslint:
    name: JavaScript Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4
        with:
          node-version: '18'
          cache: 'npm'

      # `--legacy-peer-deps` is required — @wordpress/dataviews@17 pins
      # @wordpress/components@^36 whose peer resolution collides under npm 10+
      # strict mode even though the lockfile pins react@18.3.1 (satisfies ^18).
      - run: npm ci --no-audit --no-fund --legacy-peer-deps

      # `wp-scripts lint-js` internally does `require('eslint/package.json')`
      # from its own path; when eslint lives under @wordpress/scripts's nested
      # node_modules the lookup fails. Install eslint at the top level as a
      # workaround. Version pinned to eslint 8 since @wordpress/scripts hasn't
      # yet migrated to eslint 9's flat-config API.
      - name: Install top-level eslint for wp-scripts lint-js
        run: npm install eslint@^8 --no-save --legacy-peer-deps

      - name: Run ESLint (WP wp-scripts lint:js)
        run: npm run lint:js
