name: F021 Governance Gates

on:
  push:
    branches: [main]
  pull_request:
    # NOTE: intentionally NO `paths:` filter.
    #
    # Branch protection requires this check name (`F021 grep gates (A1 /
    # layering / column widths / raw secrets)`). When a workflow is path-
    # filtered AND branch-protection-required, GitHub reports "Expected —
    # Waiting for status to be reported" indefinitely on PRs that don't
    # touch the filtered paths — blocking every unrelated PR (F022 hit
    # this exact trap 2026-07-13).
    #
    # `bin/verify-f021-gates.sh` runs whole-repo greps, so firing on every
    # PR costs ~5s. Cheap; buys deterministic branch-protection compat.
    # See B27 memory entry for the general pattern.

permissions: {}

concurrency:
  group: f021-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-f021-gates:
    name: F021 grep gates (A1 / layering / column widths / raw secrets)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run bin/verify-f021-gates.sh (T118b/T118c/T118d/T119/T120)
        run: bash bin/verify-f021-gates.sh
