name: PHP Compatibility

on:
  push:
    branches: [main]
  pull_request:
    # NOTE: intentionally NO `paths:` filter — see B27 memory entry.
    # Path-filtered required checks stall as "Expected — Waiting for
    # status to be reported" on PRs that don't touch the filtered paths
    # (workflow-only PRs, doc-only PRs, etc.), permanently blocking merge.
    # Whole-repo PHPCompat on every PR costs ~20s; trivial vs the blocking cost.

permissions: {}

jobs:
  phpcompat:
    name: PHP 8.1+ Compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: '8.4'
          tools: cs2pr

      - run: composer install --prefer-dist --no-progress

      - name: Run PHPCompatibility
        run: |
          vendor/bin/phpcs \
            --standard=PHPCompatibility \
            --extensions=php \
            --runtime-set testVersion 8.1- \
            --report=checkstyle \
            acrossai-mcp-manager.php \
            uninstall.php \
            includes/ \
            admin/ \
            public/ \
          | cs2pr
